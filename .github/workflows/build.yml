name: Build and Release Sand APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "1.0")
          SHA=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          echo "name=Sand ${VERSION} (${SHA})" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: ${{ steps.version.outputs.name }}
          body: |
            Sand — coarse, rough, irritating, gets everywhere.
            
            **Install:**
            1. Enable "Install from unknown sources" on your Android device
            2. Download `sand-debug.apk` below
            3. Install and grant permissions
            4. Enter your laptop's hotspot IP in settings
            5. Start `uvicorn main:app --host 0.0.0.0 --port 8000` on your laptop
            
            Built from commit ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/debug/app-debug.apk
          asset_name: sand-debug.apk
          asset_content_type: application/vnd.android.package-archive
